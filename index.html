body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#fff;color:#1a1a1a;padding:10px;font-size:13px;}

#overlay.show{display:flex;}
.spin{width:40px;height:40px;border:4px solid #ddd;border-top-color:#378ADD;border-radius:50%;animation:sp .8s linear infinite;}
#ovmsg{font-size:15px;font-weight:700;color:#378ADD;}
@keyframes sp{to{transform:rotate(360deg)}}

/* AI 패널 */
#aiPanel{margin-top:14px;display:none;}
.ai-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:13px;font-weight:700;color:#378ADD;}
#aiTradeBox{display:none;background:#F8F9FF;border:1px solid #D0DEFF;border-radius:10px;padding:12px 14px;margin-bottom:10px;}

.ai-sub.t1{color:#378ADD;}
.ai-sub.t2{color:#0F6E56;}
#aiTradeText,#aiPatternText{font-size:13px;line-height:1.8;color:#1a1a1a;white-space:pre-wrap;}
@media(max-width:599px){
  .stats{grid-template-columns:repeat(2,1fr);}

  .mbuy{display:flex;gap:8px;margin:8px 0;}
  .mbuy button{flex:1;padding:12px;font-size:15px;font-weight:700;}
}

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
'use strict';

const WORKER='https://kis-stock-proxy.kim80091.workers.dev';
const FEE=.005, VP=8, VIS=90, INIT=90;
let MODE='rand', stockList=[], curStock=null;
let candles=[], timer=null, pos=null, tPnl=0, trades=[];
let intSec=1, elapsed=0, capital=100000000;
let wins=0, losses=0, holdSum=0;
let tradeHistory=[], aiCount=0;

// ── GARCH / 레짐 ─────────────────────────────────────────────
const REG={
  UPTREND:{d:.0035,v:.012},DOWNTREND:{d:-.004,v:.014},
  SIDEWAYS:{d:0,v:.009},SURGE:{d:.009,v:.022},CRASH:{d:-.011,v:.026}
};
const RK=Object.keys(REG);
const TR={
  UPTREND:{UPTREND:.55,SIDEWAYS:.25,SURGE:.07,DOWNTREND:.08,CRASH:.05},
  DOWNTREND:{DOWNTREND:.5,SIDEWAYS:.25,CRASH:.08,UPTREND:.12,SURGE:.05},
  SIDEWAYS:{SIDEWAYS:.45,UPTREND:.22,DOWNTREND:.22,SURGE:.06,CRASH:.05},
  SURGE:{UPTREND:.35,SIDEWAYS:.35,DOWNTREND:.15,SURGE:.05,CRASH:.1},
  CRASH:{DOWNTREND:.35,SIDEWAYS:.3,UPTREND:.15,CRASH:.05,SURGE:.15}
};
let reg='SIDEWAYS',rrem=25,sig2=1e-4,pe=0;

function rand(a,b){return Math.random()*(b-a)+a;}
function rn(){
  let u=0,v=0;
  while(!u)u=Math.random();
  while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
function nextReg(){
  const t=TR[reg];let r=Math.random(),a=0;
  for(const k of RK){a+=t[k]||0;if(r<=a)return k;}
  return'SIDEWAYS';
}
function maybeT(){
  if(--rrem<=0){
    reg=nextReg();
    rrem=Math.round(reg==='SURGE'||reg==='CRASH'?rand(4,12):rand(15,45));
  }
}
function genR(){
  maybeT();
  const r=REG[reg];
  const om=r.v*r.v*(1-.1-.85);
  sig2=om+.1*pe*pe+.85*sig2;
  const sg=Math.sqrt(Math.max(sig2,1e-8));
  const eps=r.d+sg*(Math.random()<.035?rn()*rand(2,3.2):rn());
  pe=eps;return eps;
}
function genV(prev,eps){
  const pv=prev?prev.volume:50000;
  let v=pv*.45+50000*rand(.7,1.3)*.55;
  v*=(1+Math.min(3.5,Math.abs(eps)*16));
  if(reg==='SURGE'||reg==='CRASH')v*=rand(1.3,1.8);
  if(Math.random()<.03)v*=rand(1.5,2.3);
  return Math.max(3000,Math.round(v*rand(.92,1.08)));
}
function genC(prev){
  const p=prev?prev.close:10000,eps=genR(),vol=genV(prev,eps);
  const o=p,c=o*(1+eps),sg=Math.sqrt(Math.max(sig2,1e-8));
  return{
    open:o,
    high:Math.max(o,c)*(1+Math.abs(rn())*sg*.45),
    low:Math.max(Math.min(o,c)*(1-Math.abs(rn())*sg*.45),1),
    close:Math.max(c,1),
    volume:vol
  };
}

// ── 지표 ─────────────────────────────────────────────────────
function ma(p,idx){
  if(idx+1<p)return null;
  let s=0;for(let i=idx-p+1;i<=idx;i++)s+=candles[i].close;
  return s/p;
}
function hvol(idx){
  const s=Math.max(0,idx-60+1);let h=0;
  for(let i=s;i<=idx;i++)if(candles[i].volume>h)h=candles[i].volume;
  return h;
}
function vSig(idx){
  const h=hvol(idx);
  return h&&candles[idx].volume/h*100>95;
}
function ddR(idx){
  const s=Math.max(0,idx-60);let h=-Infinity;
  for(let i=s;i<idx;i++)if(candles[i].high>h)h=candles[i].high;
  if(!isFinite(h))return 0;
  return(candles[idx].low-h)/h*100;
}
function ddS(idx){
  const r=ddR(idx);
  if(r>-5)return 0;if(r<=-50)return-50;
  return Math.floor(r/5)*5;
}

// MA40 방향: 현재 MA40 > 직전 MA40 → 1(상승), < → -1(하락), = → 0(횡보)
function ma40Dir(idx){
  const cur=ma(40,idx);
  const prev=ma(40,idx-1);
  if(cur===null||prev===null)return 0;
  if(cur>prev)return 1;
  if(cur<prev)return -1;
  return 0;
}

// MA40 크로스 신호
// CrossUp(C,M): 직전 종가 < MA40 이고 현재 종가 >= MA40 → 골든크로스 1 (주황)
// CrossDown(C,M): 직전 종가 > MA40 이고 현재 종가 <= MA40 → 데드크로스 -1 (에메랄드)
function ma40Cross(idx){
  if(idx<41)return 0;
  const curC=candles[idx].close;
  const prevC=candles[idx-1].close;
  const curM=ma(40,idx);
  const prevM=ma(40,idx-1);
  if(!curM||!prevM)return 0;
  if(prevC<prevM&&curC>=curM)return 1;   // CrossUp → 골든크로스
  if(prevC>prevM&&curC<=curM)return -1;  // CrossDown → 데드크로스
  return 0;
}

// ── 스냅샷 (풍부한 지표) ────────────────────────────────────
function snapshot(idx){
  if(idx<0||idx>=candles.length)return null;
  const c=candles[idx];
  const m5=ma(5,idx),m20=ma(10,idx),m80=ma(40,idx);

  let upStreak=0,downStreak=0;
  for(let i=idx-1;i>=Math.max(0,idx-5);i--){
    if(candles[i].close>=candles[i].open)upStreak++;else break;
  }
  for(let i=idx-1;i>=Math.max(0,idx-5);i--){
    if(candles[i].close<candles[i].open)downStreak++;else break;
  }

  const body=Math.abs(c.close-c.open);
  const upperWick=c.high-Math.max(c.close,c.open);
  const lowerWick=Math.min(c.close,c.open)-c.low;
  const range=c.high-c.low||1;
  let candleShape='보통';
  if(body/range>0.7)candleShape=c.close>=c.open?'장대양봉':'장대음봉';
  else if(upperWick/range>0.5)candleShape='윗꼬리 긴 봉';
  else if(lowerWick/range>0.5)candleShape='아랫꼬리 긴 봉(망치형)';
  else if(body/range<0.2)candleShape='도지(십자봉)';

  const gapMa20=m20?((c.close-m20)/m20*100).toFixed(1):null;
  const gapMa80=m80?((c.close-m80)/m80*100).toFixed(1):null;
  const maConverging=m5&&m20&&m80?Math.abs(m5-m80)/m80*100<3:false;

  let prev20High=-Infinity;
  for(let i=Math.max(0,idx-20);i<idx;i++)if(candles[i].high>prev20High)prev20High=candles[i].high;
  const breakout=prev20High>0&&c.close>prev20High;

  let avgVol=0,volCount=0;
  for(let i=Math.max(0,idx-20);i<idx;i++){avgVol+=candles[i].volume;volCount++;}
  avgVol=volCount>0?avgVol/volCount:c.volume;
  const volRatio=(c.volume/avgVol*100).toFixed(0);

  return{
    price:c.close,ma5:m5,ma20:m20,ma80:m80,
    gapMa20,gapMa80,maConverging,
    volSignal:vSig(idx),volRatio,
    ddStep:ddS(idx),ddRaw:ddR(idx).toFixed(1),
    isUp:c.close>=c.open,candleShape,
    upStreak,downStreak,breakout
  };
}
function maStatus(s){
  if(!s||!s.ma5||!s.ma20||!s.ma80)return'데이터 부족';
  if(s.ma5>s.ma20&&s.ma20>s.ma80)return'정배열(상승)';
  if(s.ma5<s.ma20&&s.ma20<s.ma80)return'역배열(하락)';
  return'혼조';
}

// ── 차트 플러그인 ─────────────────────────────────────────────
const uC='#E24B4A',dC='#378ADD',uV='rgba(226,75,74,.5)',dV='rgba(55,138,221,.5)';
const bC='#0F6E56',sC='#993556';

Chart.register({id:'ann',afterDraw(chart){
  const o=chart.options.plugins&&chart.options.plugins.ann;
  if(!o||!o.list)return;
  const{ctx,scales}=chart;
  const x=scales.x,y=scales.y;
  ctx.save();
  for(const a of o.list){
    if(a.t==='box'){
      ctx.fillStyle=a.bg;
      const x1=x.getPixelForValue(a.x1),x2=x.getPixelForValue(a.x2);
      const y1=y.getPixelForValue(a.y2),y2=y.getPixelForValue(a.y1);
      ctx.fillRect(x1,y1,Math.max(1,x2-x1),Math.max(1,y2-y1));
    }else if(a.t==='wick'){
      ctx.strokeStyle=a.cl;ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(x.getPixelForValue(a.xi),y.getPixelForValue(a.hi));
      ctx.lineTo(x.getPixelForValue(a.xi),y.getPixelForValue(a.lo));
      ctx.stroke();
    }else if(a.t==='dot'){
      ctx.fillStyle='#BA7517';ctx.strokeStyle='#633806';ctx.lineWidth=1;
      ctx.beginPath();
      ctx.arc(x.getPixelForValue(a.xi),y.getPixelForValue(a.yi),4,0,Math.PI*2);
      ctx.fill();ctx.stroke();
    }else if(a.t==='hline'){
      ctx.strokeStyle=a.cl;ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(x.getPixelForValue(a.x1),y.getPixelForValue(a.yv));
      ctx.lineTo(x.getPixelForValue(a.x2),y.getPixelForValue(a.yv));
      ctx.stroke();
    }else if(a.t==='arrow'){
      const px=x.getPixelForValue(a.xi),py=y.getPixelForValue(a.yi),sz=7;
      ctx.fillStyle=a.cl;ctx.strokeStyle=a.cl;ctx.lineWidth=1.5;
      if(a.up){
        const by=py+sz*2.2;
        ctx.beginPath();ctx.moveTo(px,by-sz*1.6);ctx.lineTo(px-sz,by);ctx.lineTo(px+sz,by);ctx.closePath();ctx.fill();
        ctx.beginPath();ctx.moveTo(px,by);ctx.lineTo(px,by+sz*.8);ctx.stroke();
      }else{
        const by=py-sz*2.2;
        ctx.beginPath();ctx.moveTo(px,by+sz*1.6);ctx.lineTo(px-sz,by);ctx.lineTo(px+sz,by);ctx.closePath();ctx.fill();
        ctx.beginPath();ctx.moveTo(px,by);ctx.lineTo(px,by-sz*.8);ctx.stroke();
      }
    }
  }
  ctx.restore();
}});

// ── 차트 생성 ────────────────────────────────────────────────
function mkChart(id,type,yEx){
  return new Chart(document.getElementById(id),{
    type,data:{labels:[],datasets:[]},
    options:{
      responsive:true,maintainAspectRatio:false,animation:false,
      layout:{padding:{left:4,right:4}},
      interaction:{intersect:false},
      scales:{
        x:{ticks:{display:false},grid:{display:false},min:0,max:VIS+VP-1},
        y:{position:'right',ticks:{font:{size:11},padding:6,callback:v=>Math.round(v).toLocaleString('ko-KR')},afterFit:s=>{s.width=64;},grid:{color:'rgba(128,128,128,.1)'},...(yEx||{})}
      },
      plugins:{legend:{display:false},tooltip:{enabled:false},ann:{list:[]}}
    },plugins:[]
  });
}

const PC=mkChart('cPrice','line');
const VC=mkChart('cVol','bar',{beginAtZero:true,ticks:{font:{size:10},padding:6,callback:v=>Math.round(v).toLocaleString('ko-KR')}});

// MA40 추세 방향 차트 (막대: 1=상승/빨강, -1=하락/파랑, 0=횡보/회색)
const MT=new Chart(document.getElementById('cMaTrend'),{
  type:'bar',
  data:{labels:[],datasets:[{label:'MA40방향',data:[],backgroundColor:[]}]},
  options:{
    responsive:true,maintainAspectRatio:false,animation:false,
    layout:{padding:{left:4,right:4}},
    scales:{
      x:{ticks:{display:false},grid:{display:false},min:0,max:VIS+VP-1},
      y:{position:'right',min:-1.5,max:1.5,
        ticks:{font:{size:10},padding:6,callback:v=>v===1?'상승':v===-1?'하락':'',stepSize:1},
        afterFit:s=>{s.width=64;},
        grid:{color:'rgba(128,128,128,.1)'}}
    },
    plugins:{legend:{display:false},tooltip:{enabled:false}}
  },plugins:[]
});

// MA40 골든/데드크로스 차트 (주황: 골든, 에메랄드: 데드)

// ── 뷰 계산 ──────────────────────────────────────────────────
function vs(){return Math.max(0,candles.length-VIS);}
function mkLbl(){return Array.from({length:VIS+VP},(_,i)=>i);}
function vdata(fn){
  const s=vs(),a=[];
  for(let i=s;i<candles.length;i++)a.push(fn(i));
  while(a.length<VIS)a.unshift(null);
  for(let i=0;i<VP;i++)a.push(null);
  return a;
}
function buildPA(){
  const list=[],s=vs();
  for(let i=s;i<candles.length;i++){
    const c=candles[i],li=i-s,up=c.close>=c.open;
    list.push({t:'box',x1:li-.3,x2:li+.3,y1:Math.min(c.open,c.close),y2:Math.max(c.open,c.close),bg:up?uC:dC});
    list.push({t:'wick',xi:li,hi:c.high,lo:c.low,cl:up?uC:dC});
    if(vSig(i))list.push({t:'dot',xi:li,yi:c.high*1.01});
  }
  trades.forEach(t=>{
    if(t.i<s||t.i>=candles.length)return;
    const c=candles[t.i],li=t.i-s;
    list.push({t:'arrow',xi:li,yi:t.buy?c.low*.985:c.high*1.015,cl:t.buy?bC:sC,up:t.buy});
  });
  return list;
}
function buildVA(){
  const hv=hvol(candles.length-1),vc=candles.length-vs();
  return[{t:'hline',x1:0,x2:vc-1+VP,yv:hv,cl:'#D4537E'}];
}

// ── 차트 갱신 ────────────────────────────────────────────────
function refresh(){
  if(!candles.length)return;
  const s=vs(),lbls=mkLbl();
  PC.data.labels=lbls;
  PC.data.datasets[0].data=vdata(i=>ma(5,i));
  PC.data.datasets[1].data=vdata(i=>ma(10,i));
  PC.data.datasets[2].data=vdata(i=>ma(40,i));
  PC.options.plugins.ann.list=buildPA();
  let mn=Infinity,mx=-Infinity;
  for(let i=s;i<candles.length;i++){
    if(candles[i].low<mn)mn=candles[i].low;
    if(candles[i].high>mx)mx=candles[i].high;
  }
  const pd=(mx-mn)*.08;
  PC.options.scales.y.min=mn-pd;PC.options.scales.y.max=mx+pd;
  VC.data.labels=lbls;
  VC.data.datasets[0].data=vdata(i=>candles[i].volume);
  VC.data.datasets[0].backgroundColor=candles.slice(s).map(c=>c.close>=c.open?uV:dV);
  VC.options.plugins.ann.list=buildVA();
  DC.data.labels=lbls;
  DC.data.datasets[0].data=vdata(i=>ddS(i));

  // MA40 추세 방향 차트
  MT.data.labels=lbls;
  const mtData=vdata(i=>ma40Dir(i));
  MT.data.datasets[0].data=mtData;
  MT.data.datasets[0].backgroundColor=mtData.map(v=>
    v===1?'rgba(226,75,74,0.7)':v===-1?'rgba(55,138,221,0.7)':'rgba(180,180,180,0.4)'
  );

  // MA40 현재값 레이블
  const lastDir=ma40Dir(candles.length-1);
  const trendEl=document.getElementById('vMaTrend');
  if(lastDir===1){trendEl.textContent='▲ 상승';trendEl.style.color='#E24B4A';}
  else if(lastDir===-1){trendEl.textContent='▼ 하락';trendEl.style.color='#378ADD';}
  else{trendEl.textContent='— 횡보';trendEl.style.color='#888';}

  // MA40 골든/데드크로스 차트
  MC.data.labels=lbls;
  const mcData=vdata(i=>ma40Cross(i));
  MC.data.datasets[0].data=mcData;
  MC.data.datasets[0].backgroundColor=mcData.map(v=>
    v===1?'rgba(245,166,35,0.9)':v===-1?'rgba(46,205,167,0.9)':'rgba(0,0,0,0)'
  );

  // MA40 크로스 현재값 레이블
  const lastCross=ma40Cross(candles.length-1);
  const crossEl=document.getElementById('vMaCross');
  if(lastCross===1){crossEl.textContent='▲ 골든크로스';crossEl.style.color='#F5A623';}
  else if(lastCross===-1){crossEl.textContent='▼ 데드크로스';crossEl.style.color='#2ECDA7';}
  else{crossEl.textContent='-';crossEl.style.color='#555';}

  PC.update('none');VC.update('none');DC.update('none');MT.update('none');MC.update('none');
  updateUI();
}

    anel.textContent=cg.toFixed(2)+'%';anel.style.color=cg>0?bC:(cg<0?sC:'#1a1a1a');

function log(t){
  const el=document.getElementById('tlog'),d=document.createElement('div');
  d.textContent=t;el.prepend(d);
}
function doBuy(){
  if(pos){log('이미 보유 중입니다.');return;}
  const last=candles[candles.length-1],idx=candles.length-1;
  pos={p:last.close,i:idx,d:elapsed,snap:snapshot(idx),maxPct:0,minPct:0};
  trades.push({i:idx,buy:true});
  log('매수 @ '+fp(last.close)+' ('+elapsed+'일째)');
  refresh();
}
function doSell(){
  if(!pos){log('보유 중인 포지션이 없습니다.');return;}
  const last=candles[candles.length-1],idx=candles.length-1;
  const gross=(last.close-pos.p)/pos.p*100;
  const net=gross-FEE*100;
  tPnl+=net;net>0?wins++:losses++;
  const h=elapsed-pos.d;holdSum+=h;
  trades.push({i:idx,buy:false});
  log('매도 @ '+fp(last.close)+' | 보유 '+h+'일 | '+net.toFixed(2)+'%');
  const record={
    no:tradeHistory.length+1,
    buyPrice:pos.p,sellPrice:last.close,
    buyDay:pos.d,sellDay:elapsed,holdDays:h,
    netPct:net,grossPct:gross,
    maxPct:pos.maxPct,minPct:pos.minPct,
    win:net>0,
    buySnap:pos.snap,sellSnap:snapshot(idx)
  };
  tradeHistory.push(record);
  pos=null;refresh();
  requestAIAnalysis(record);
}

// ── tick ─────────────────────────────────────────────────────
function tick(){
  // 실제 종목 모드: 저장된 실제 데이터에서 다음 봉 순서대로 추가
  if(MODE==='real' && window._realAllCandles && window._realNextIdx < window._realAllCandles.length){
    candles.push(window._realAllCandles[window._realNextIdx]);
    window._realNextIdx++;
  } else {
    // 랜덤 생성 모드 or 실제 데이터 소진 후 GARCH 연장
    candles.push(genC(candles[candles.length-1]));
  }
  elapsed++;
  if(pos){
    const cur=(candles[candles.length-1].close-pos.p)/pos.p*100;
    if(cur>pos.maxPct)pos.maxPct=cur;
    if(cur<pos.minPct)pos.minPct=cur;
  }
  if(candles.length>600){
    candles.shift();
    trades.forEach(t=>{t.i--;});
    if(pos)pos.i--;
    trades=trades.filter(t=>t.i>=0);
  }
  refresh();
}
function startT(){if(timer)return;timer=setInterval(tick,intSec*1000);}
function stopT(){if(timer){clearInterval(timer);timer=null;}}

async function loadStockList(){
  try{
    showOv('종목 목록 불러오는 중...');
    const res=await fetch(WORKER+'/list');
    const js=await res.json();
    hideOv();
    if(!js.stocks||!js.stocks.length){
      alert('저장된 종목이 없습니다.\nupload_stocks.py를 먼저 실행하세요.');
      return;
    }
    stockList=js.stocks;
    const sel=document.getElementById('stockSel');
    sel.innerHTML='';
    stockList.forEach(s=>{
      const o=document.createElement('option');
      o.value=s.code;
      o.textContent=s.name+' ('+s.code+') — '+s.count+'일';
      sel.appendChild(o);
    });
    // 랜덤 종목 자동 로드
    const rnd=stockList[Math.floor(Math.random()*stockList.length)];
    document.getElementById('stockSel').value=rnd.code;
    loadReal(rnd.code);
  }catch(e){
    hideOv();
    alert('종목 목록 로드 실패: '+e.message);
  }
}
async function loadReal(code){
  showOv(code+' 불러오는 중...');
  stopT();
  try{
    const res=await fetch(WORKER+'/ohlcv?code='+code);
    const js=await res.json();
    if(js.error)throw new Error(js.error);
    if(!js.candles||js.candles.length<10)throw new Error('데이터 부족');

    const allCandles=js.candles.map(d=>({open:d.open,high:d.high,low:d.low,close:d.close,volume:d.volume}));
    const total=allCandles.length;

    // 랜덤 시작 위치: MA80 계산이 가능한 최소 80봉 이후부터
    // 전체의 10% ~ 80% 사이에서 랜덤 시작 (너무 끝에서 시작하면 연습 구간이 짧아짐)
    const minStart = Math.max(80, Math.floor(total * 0.1));
    const maxStart = Math.floor(total * 0.8);
    const startIdx = Math.floor(Math.random() * (maxStart - minStart + 1)) + minStart;

    // 시작 위치까지의 데이터만 로드 (이후는 시작 버튼으로 1봉씩 추가)
    candles = allCandles.slice(0, startIdx);
    // 전체 데이터 저장 (시작 이후 봉 추가용)
    window._realAllCandles = allCandles;
    window._realNextIdx = startIdx;

    curStock={name:js.name||code,code:js.code,count:js.count,from:js.from,to:js.to,totalCandles:total};
    elapsed=candles.length;
    reg='SIDEWAYS';rrem=25;sig2=1e-4;pe=0;
    resetStats();refresh();

    const startDate=allCandles[startIdx-1]?.date||'';
    const pct=((startIdx/total)*100).toFixed(0);
    setBanner('📈 '+curStock.name+' ('+code+') | 전체 '+total+'일 중 '+pct+'% 지점('+startDate+')에서 시작','breal');
    hideOv();
  }catch(e){
    hideOv();alert('불러오기 실패: '+e.message);
  }
}

async function requestPatternAnalysis(){
  if(tradeHistory.length<3)return;
  document.getElementById('aiPatternBox').style.display='block';
  document.getElementById('aiPatternText').textContent='⏳ 패턴 분석 중...';

  const tot=wins+losses;
  const wr=(wins/tot*100).toFixed(1);
  const avgH=(holdSum/tot).toFixed(1);
  const winTrades=tradeHistory.filter(t=>t.win);
  const lossTrades=tradeHistory.filter(t=>!t.win);
  const avgWin=winTrades.reduce((s,t)=>s+t.netPct,0)/(wins||1);
  const avgLoss=lossTrades.reduce((s,t)=>s+t.netPct,0)/(losses||1);
  const maxWin=Math.max(...tradeHistory.map(t=>t.netPct));
  const maxLoss=Math.min(...tradeHistory.map(t=>t.netPct));
  const pf=losses>0?Math.abs(avgWin/avgLoss):99;
  const buyUptrend=tradeHistory.filter(t=>t.buySnap&&t.buySnap.ma5>t.buySnap.ma20&&t.buySnap.ma20>t.buySnap.ma80).length;
  const buyVol=tradeHistory.filter(t=>t.buySnap&&t.buySnap.volSignal).length;
  const buyDip=tradeHistory.filter(t=>t.buySnap&&t.buySnap.ddStep<=-20).length;
  const avgMaxPct=tradeHistory.reduce((s,t)=>s+t.maxPct,0)/tot;
  const earlyExits=tradeHistory.filter(t=>t.maxPct-t.netPct>3).length;
  const avgHW=winTrades.length>0?winTrades.reduce((s,t)=>s+t.holdDays,0)/winTrades.length:0;
  const avgHL=lossTrades.length>0?lossTrades.reduce((s,t)=>s+t.holdDays,0)/lossTrades.length:0;

  const prompt=`당신은 주식 단기 매매 트레이닝 코치입니다. 학습자의 ${tot}회 매매 전체 패턴을 분석해주세요. 마크다운 없이 일반 텍스트로, 한국어로 답변하세요.

===== 전체 성과 =====
승률: ${wr}% (${wins}승 ${losses}패)
평균 수익: +${avgWin.toFixed(2)}%  |  평균 손실: ${avgLoss.toFixed(2)}%
최대 수익: +${maxWin.toFixed(2)}%  |  최대 손실: ${maxLoss.toFixed(2)}%
손익비: ${pf.toFixed(2)}
평균 보유기간: ${avgH}일 (수익: ${avgHW.toFixed(1)}일 / 손실: ${avgHL.toFixed(1)}일)
누적 손익: ${tPnl.toFixed(2)}%

===== 매수 습관 =====
정배열 매수: ${buyUptrend}/${tot}회
거래량 급증 시 매수: ${buyVol}/${tot}회
60일 -20% 이상 하락 구간 매수: ${buyDip}/${tot}회

===== 매도 습관 =====
평균 최고 수익률: +${avgMaxPct.toFixed(2)}%
최고점 대비 3% 이상 손실 후 매도: ${earlyExits}/${tot}회

===== 최근 5거래 =====
${tradeHistory.slice(-5).map(t=>'#'+t.no+': '+(t.win?'수익':'손실')+' '+t.netPct.toFixed(1)+'% | 보유'+t.holdDays+'일 | 최고+'+t.maxPct.toFixed(1)+'%').join('\n')}

아래 5가지를 번호와 제목 붙여서 서술하세요.
1. 매수 습관 분석
2. 매도 습관 분석
3. 손익비 분석
4. 반복되는 실수 패턴
5. 지금 당장 실천해야 할 개선책 (2~3가지)`;

  try{
    const text=await callAI(prompt);
    document.getElementById('aiPatternText').textContent=text;
  }catch(e){
    document.getElementById('aiPatternText').textContent='패턴 분석 오류: '+e.message;
  }
}

// ── 모드 전환 ────────────────────────────────────────────────
function setMode(m){
  MODE=m;const ir=m==='real';
  document.getElementById('btnRand').className=ir?'minact':'mrand';
  document.getElementById('btnReal').className=ir?'mreal':'minact';
  document.getElementById('stockRow').className=ir?'show':'';
  if(!ir){
    setBanner('📊 랜덤 생성 모드 — 시장 국면 시뮬레이터','brand');
    curStock=null;initRand();
  }else{
    if(!stockList.length)loadStockList();
    else{
      const rnd=stockList[Math.floor(Math.random()*stockList.length)];
      document.getElementById('stockSel').value=rnd.code;
      loadReal(rnd.code);
    }
  }
}
function setBanner(t,c){
  const el=document.getElementById('banner');
  el.textContent=t;el.className='banner '+c;
}
function showOv(m){
  document.getElementById('ovmsg').textContent=m;
  document.getElementById('overlay').className='show';
}
function hideOv(){document.getElementById('overlay').className='';}

// ── 이벤트 ───────────────────────────────────────────────────
document.getElementById('btnRand').onclick=()=>setMode('rand');
document.getElementById('btnReal').onclick=()=>setMode('real');
document.getElementById('btnLoad').onclick=()=>{
  const v=document.getElementById('stockSel').value;
  if(v)loadReal(v);
};
document.getElementById('btnRandStock').onclick=()=>{
  if(!stockList.length)return;
  const s=stockList[Math.floor(Math.random()*stockList.length)];
  document.getElementById('stockSel').value=s.code;
  loadReal(s.code);
};
document.getElementById('btnStart').onclick=startT;
document.getElementById('btnPause').onclick=stopT;
document.getElementById('btnReset').onclick=()=>{
  stopT();
  if(MODE==='rand')initRand();
  else{resetStats();if(curStock)loadReal(curStock.code);else refresh();}
};
document.getElementById('btnBuy').onclick=doBuy;
document.getElementById('btnSell').onclick=doSell;
document.getElementById('btnBuyM').onclick=doBuy;
document.getElementById('btnSellM').onclick=doSell;

[['s05',.5],['s1',1],['s2',2],['s3',3]].forEach(([id,v])=>{
  document.getElementById(id).onclick=()=>{
    intSec=v;
    ['s05','s1','s2','s3'].forEach(k=>document.getElementById(k).className=k===id?'b':'');
    if(timer)startT();
  };
});
[['c1',10000000],['c5',50000000],['c10',100000000]].forEach(([id,v])=>{
  document.getElementById(id).onclick=()=>{
    capital=v;
    ['c1','c5','c10'].forEach(k=>document.getElementById(k).className=k===id?'b':'');
    updateUI();
  };
});

// ── 시작 ─────────────────────────────────────────────────────
initRand();

})();
</script>
