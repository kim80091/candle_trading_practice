<!DOCTYPE html>

<title>일봉 실전차트 매매 연습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#fff;color:#1a1a1a;padding:10px;font-size:13px;}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
button{font-family:inherit;font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid #ccc;background:#fafafa;color:#333;cursor:pointer;}
button:active{opacity:.8;}
.g{border-color:#0F6E56;color:#0F6E56;}
.r{border-color:#993556;color:#993556;}
.b{border-color:#378ADD;color:#378ADD;font-weight:600;}
.banner{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:700;margin-bottom:6px;}
.breal{background:#EDFAF3;color:#0F6E56;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:6px;}
.card{background:#f5f5f5;border-radius:8px;padding:4px 10px;}
.card .lbl{font-size:10px;color:#888;margin-bottom:1px;}
.card .val{font-size:15px;font-weight:700;}
.cbox{border:1px solid #eaeaea;border-radius:8px;background:#fff;margin-bottom:4px;overflow:hidden;}
.cwrap{position:relative;}
.cwrap.pc{height:300px;}.cwrap.vc{height:90px;}.cwrap.dc{height:70px;}
.cwrap canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
.ddrow{display:flex;justify-content:space-between;padding:4px 8px 0;font-size:11px;color:#888;}
.ddval{font-size:13px;font-weight:700;color:#D85A30;}
.tradebtns{display:flex;gap:8px;margin:6px 0;}
.tradebtns button{flex:1;padding:10px;font-size:14px;font-weight:700;}
.logtitle{font-size:12px;color:#888;margin-top:6px;margin-bottom:3px;}
#tlog{font-size:12px;max-height:100px;overflow-y:auto;border:1px solid #eaeaea;border-radius:8px;padding:5px 9px;}
#overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:20px;}
#overlay.show{display:flex;}
.spin{width:40px;height:40px;border:4px solid #ddd;border-top-color:#378ADD;border-radius:50%;animation:sp .8s linear infinite;}
#ovmsg{font-size:15px;font-weight:700;color:#378ADD;}
@keyframes sp{to{transform:rotate(360deg)}}
#aiPanel{margin-top:14px;display:none;}
.ai-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:13px;font-weight:700;color:#378ADD;}
#aiTradeBox{display:none;background:#F8F9FF;border:1px solid #D0DEFF;border-radius:10px;padding:12px 14px;margin-bottom:10px;}
#aiPatternBox{display:none;background:#F6FFF9;border:1px solid #C0EDD4;border-radius:10px;padding:12px 14px;}
.ai-sub{font-size:11px;font-weight:700;margin-bottom:6px;}
.ai-sub.t1{color:#378ADD;}.ai-sub.t2{color:#0F6E56;}
#aiTradeText,#aiPatternText{font-size:13px;line-height:1.8;color:#1a1a1a;white-space:pre-wrap;}
@media(max-width:599px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .cwrap.pc{height:260px;}.cwrap.vc{height:75px;}.cwrap.dc{height:55px;}
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){
'use strict';

const WORKER='https://kis-stock-proxy.kim80091.workers.dev';
const FEE=.0023, VP=8, VIS=90, INIT=90;
let MODE='real', stockList=[], curStock=null;
let candles=[], timer=null, pos=null, tPnl=0, trades=[];
let intSec=1, elapsed=0, capital=100000000;
let wins=0, losses=0, holdSum=0;
let tradeHistory=[], aiCount=0;
let halfSlots=[];
let stockShuffled=[], stockShuffleIdx=0;
let showBB=localStorage.getItem('showBB')==='true'; // 볼린저밴드 표시 여부 (localStorage 유지)

// ── 볼린저밴드 계산 ──────────────────────────────────────────
function bbUpper(idx){
  if(idx+1<20)return null;
  let sum=0;for(let i=idx-19;i<=idx;i++)sum+=candles[i].close;
  const mean=sum/20;
  let variance=0;for(let i=idx-19;i<=idx;i++)variance+=(candles[i].close-mean)**2;
  const std=Math.sqrt(variance/20);
  return mean+2*std;
}
function bbLower(idx){
  if(idx+1<20)return null;
  let sum=0;for(let i=idx-19;i<=idx;i++)sum+=candles[i].close;
  const mean=sum/20;
  let variance=0;for(let i=idx-19;i<=idx;i++)variance+=(candles[i].close-mean)**2;
  const std=Math.sqrt(variance/20);
  return mean-2*std;
}

// ── GARCH ────────────────────────────────────────────────────
const REG={UPTREND:{d:.0035,v:.012},DOWNTREND:{d:-.004,v:.014},SIDEWAYS:{d:0,v:.009},SURGE:{d:.009,v:.022},CRASH:{d:-.011,v:.026}};
const RK=Object.keys(REG);
const TR={
  UPTREND:{UPTREND:.55,SIDEWAYS:.25,SURGE:.07,DOWNTREND:.08,CRASH:.05},
  DOWNTREND:{DOWNTREND:.5,SIDEWAYS:.25,CRASH:.08,UPTREND:.12,SURGE:.05},
  SIDEWAYS:{SIDEWAYS:.45,UPTREND:.22,DOWNTREND:.22,SURGE:.06,CRASH:.05},
  SURGE:{UPTREND:.35,SIDEWAYS:.35,DOWNTREND:.15,SURGE:.05,CRASH:.1},
  CRASH:{DOWNTREND:.35,SIDEWAYS:.3,UPTREND:.15,CRASH:.05,SURGE:.15}
};
let reg='SIDEWAYS',rrem=25,sig2=1e-4,pe=0;
function rand(a,b){return Math.random()*(b-a)+a;}
function rn(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
function nextReg(){const t=TR[reg];let r=Math.random(),a=0;for(const k of RK){a+=t[k]||0;if(r<=a)return k;}return'SIDEWAYS';}
function maybeT(){if(--rrem<=0){reg=nextReg();rrem=Math.round(reg==='SURGE'||reg==='CRASH'?rand(4,12):rand(15,45));}}
function genR(){
  maybeT();const r=REG[reg];
  const om=r.v*r.v*(1-.1-.85);
  sig2=om+.1*pe*pe+.85*sig2;
  const sg=Math.sqrt(Math.max(sig2,1e-8));
  const eps=r.d+sg*(Math.random()<.035?rn()*rand(2,3.2):rn());
  pe=eps;return eps;
}
function genV(prev,eps){
  const pv=prev?prev.volume:50000;
  let v=pv*.45+50000*rand(.7,1.3)*.55;
  v*=(1+Math.min(3.5,Math.abs(eps)*16));
  if(reg==='SURGE'||reg==='CRASH')v*=rand(1.3,1.8);
  if(Math.random()<.03)v*=rand(1.5,2.3);
  return Math.max(3000,Math.round(v*rand(.92,1.08)));
}
function genC(prev){
  const p=prev?prev.close:10000,eps=genR(),vol=genV(prev,eps);
  const o=p,c=o*(1+eps),sg=Math.sqrt(Math.max(sig2,1e-8));
  return{open:o,high:Math.max(o,c)*(1+Math.abs(rn())*sg*.45),low:Math.max(Math.min(o,c)*(1-Math.abs(rn())*sg*.45),1),close:Math.max(c,1),volume:vol};
}

// ── 지표 ─────────────────────────────────────────────────────
function ma(p,idx){if(idx+1<p)return null;let s=0;for(let i=idx-p+1;i<=idx;i++)s+=candles[i].close;return s/p;}
function hvol(idx){const s=Math.max(0,idx-60+1);let h=0;for(let i=s;i<=idx;i++)if(candles[i].volume>h)h=candles[i].volume;return h;}
function vSig(idx){const h=hvol(idx);return h&&candles[idx].volume/h*100>95;}
function ddR(idx){const s=Math.max(0,idx-60);let h=-Infinity;for(let i=s;i<idx;i++)if(candles[i].high>h)h=candles[i].high;if(!isFinite(h))return 0;return(candles[idx].low-h)/h*100;}
function ddS(idx){const r=ddR(idx);if(r>-5)return 0;if(r<=-50)return-50;return Math.floor(r/5)*5;}
function ma40Dir(idx){const cur=ma(40,idx),prev=ma(40,idx-1);if(!cur||!prev)return 0;return cur>prev?1:cur<prev?-1:0;}
function ma40Cross(idx){
  if(idx<41)return 0;
  const cc=candles[idx].close,pc=candles[idx-1].close;
  const cm=ma(40,idx),pm=ma(40,idx-1);
  if(!cm||!pm)return 0;
  if(pc<pm&&cc>=cm)return 1;
  if(pc>pm&&cc<=cm)return -1;
  return 0;
}

// ── 스냅샷 ───────────────────────────────────────────────────
function snapshot(idx){
  if(idx<0||idx>=candles.length)return null;
  const c=candles[idx];
  const m5=ma(5,idx),m20=ma(10,idx),m80=ma(40,idx);
  let upStreak=0,downStreak=0;
  for(let i=idx-1;i>=Math.max(0,idx-5);i--){if(candles[i].close>=candles[i].open)upStreak++;else break;}
  for(let i=idx-1;i>=Math.max(0,idx-5);i--){if(candles[i].close<candles[i].open)downStreak++;else break;}
  const body=Math.abs(c.close-c.open),range=c.high-c.low||1;
  const upperWick=c.high-Math.max(c.close,c.open),lowerWick=Math.min(c.close,c.open)-c.low;
  let candleShape='보통';
  if(body/range>0.7)candleShape=c.close>=c.open?'장대양봉':'장대음봉';
  else if(upperWick/range>0.5)candleShape='윗꼬리 긴 봉';
  else if(lowerWick/range>0.5)candleShape='아랫꼬리 긴 봉(망치형)';
  else if(body/range<0.2)candleShape='도지(십자봉)';
  const gapMa20=m20?((c.close-m20)/m20*100).toFixed(1):null;
  const gapMa80=m80?((c.close-m80)/m80*100).toFixed(1):null;
  const maConverging=m5&&m20&&m80?Math.abs(m5-m80)/m80*100<3:false;
  let prev20High=-Infinity;
  for(let i=Math.max(0,idx-20);i<idx;i++)if(candles[i].high>prev20High)prev20High=candles[i].high;
  const breakout=prev20High>0&&c.close>prev20High;
  let avgVol=0,volCount=0;
  for(let i=Math.max(0,idx-20);i<idx;i++){avgVol+=candles[i].volume;volCount++;}
  avgVol=volCount>0?avgVol/volCount:c.volume;
  const volRatio=(c.volume/avgVol*100).toFixed(0);
  return{price:c.close,ma5:m5,ma20:m20,ma80:m80,gapMa20,gapMa80,maConverging,volSignal:vSig(idx),volRatio,ddStep:ddS(idx),ddRaw:ddR(idx).toFixed(1),isUp:c.close>=c.open,candleShape,upStreak,downStreak,breakout};
}
function maStatus(s){
  if(!s||!s.ma5||!s.ma20||!s.ma80)return'데이터 부족';
  if(s.ma5>s.ma20&&s.ma20>s.ma80)return'정배열(상승)';
  if(s.ma5<s.ma20&&s.ma20<s.ma80)return'역배열(하락)';
  return'혼조';
}

// ── 차트 플러그인 ─────────────────────────────────────────────
const uC='#E24B4A',dC='#378ADD',uV='rgba(226,75,74,.5)',dV='rgba(55,138,221,.5)',bC='#0F6E56',sC='#993556';
Chart.register({id:'ann',afterDraw(chart){
  const o=chart.options.plugins&&chart.options.plugins.ann;if(!o||!o.list)return;
  const{ctx,scales}=chart;const x=scales.x,y=scales.y;ctx.save();
  for(const a of o.list){
    if(a.t==='box'){ctx.fillStyle=a.bg;const x1=x.getPixelForValue(a.x1),x2=x.getPixelForValue(a.x2),y1=y.getPixelForValue(a.y2),y2=y.getPixelForValue(a.y1);ctx.fillRect(x1,y1,Math.max(1,x2-x1),Math.max(1,y2-y1));}
    else if(a.t==='wick'){ctx.strokeStyle=a.cl;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x.getPixelForValue(a.xi),y.getPixelForValue(a.hi));ctx.lineTo(x.getPixelForValue(a.xi),y.getPixelForValue(a.lo));ctx.stroke();}
    else if(a.t==='dot'){ctx.fillStyle='#BA7517';ctx.strokeStyle='#633806';ctx.lineWidth=1;ctx.beginPath();ctx.arc(x.getPixelForValue(a.xi),y.getPixelForValue(a.yi),4,0,Math.PI*2);ctx.fill();ctx.stroke();}
    else if(a.t==='hline'){ctx.strokeStyle=a.cl;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x.getPixelForValue(a.x1),y.getPixelForValue(a.yv));ctx.lineTo(x.getPixelForValue(a.x2),y.getPixelForValue(a.yv));ctx.stroke();}
    else if(a.t==='arrow'){
      const px=x.getPixelForValue(a.xi),py=y.getPixelForValue(a.yi),sz=(a.sz||1)*7;
      ctx.fillStyle=a.cl;ctx.strokeStyle=a.cl;ctx.lineWidth=1.5;
      if(a.up){const by=py+sz*2.2;ctx.beginPath();ctx.moveTo(px,by-sz*1.6);ctx.lineTo(px-sz,by);ctx.lineTo(px+sz,by);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(px,by);ctx.lineTo(px,by+sz*.8);ctx.stroke();}
      else{const by=py-sz*2.2;ctx.beginPath();ctx.moveTo(px,by+sz*1.6);ctx.lineTo(px-sz,by);ctx.lineTo(px+sz,by);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(px,by);ctx.lineTo(px,by-sz*.8);ctx.stroke();}
    }
  }
  ctx.restore();
}});

// ── 차트 생성 ────────────────────────────────────────────────
function mkChart(id,type,yEx){
  return new Chart(document.getElementById(id),{
    type,data:{labels:[],datasets:[]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,layout:{padding:{left:4,right:4}},interaction:{intersect:false},
      scales:{x:{ticks:{display:false},grid:{display:false},min:0,max:VIS+VP-1},
        y:{position:'right',ticks:{font:{size:11},padding:6,callback:v=>Math.round(v).toLocaleString('ko-KR')},afterFit:s=>{s.width=64;},grid:{color:'rgba(128,128,128,.1)'},...(yEx||{})}},
      plugins:{legend:{display:false},tooltip:{enabled:false},ann:{list:[]}}},plugins:[]
  });
}
const PC=mkChart('cPrice','line');
const VC=mkChart('cVol','bar',{beginAtZero:true,ticks:{font:{size:10},padding:6,callback:v=>Math.round(v).toLocaleString('ko-KR')}});
const DC=mkChart('cDd','line',{min:-55,max:0,ticks:{stepSize:10,font:{size:10}}});
const MT=new Chart(document.getElementById('cMaTrend'),{
  type:'bar',data:{labels:[],datasets:[{label:'MA40방향',data:[],backgroundColor:[]}]},
  options:{responsive:true,maintainAspectRatio:false,animation:false,layout:{padding:{left:4,right:4}},
    scales:{x:{ticks:{display:false},grid:{display:false},min:0,max:VIS+VP-1},
      y:{position:'right',min:-1.5,max:1.5,ticks:{font:{size:10},padding:6,callback:v=>v===1?'상승':v===-1?'하락':'',stepSize:1},afterFit:s=>{s.width=64;},grid:{color:'rgba(128,128,128,.1)'}}},
    plugins:{legend:{display:false},tooltip:{enabled:false}}},plugins:[]
});
const MC=new Chart(document.getElementById('cMaCross'),{
  type:'bar',data:{labels:[],datasets:[{label:'MA40크로스',data:[],backgroundColor:[]}]},
  options:{responsive:true,maintainAspectRatio:false,animation:false,layout:{padding:{left:4,right:4}},
    scales:{x:{ticks:{display:false},grid:{display:false},min:0,max:VIS+VP-1},
      y:{position:'right',min:-1.5,max:1.5,ticks:{font:{size:10},padding:6,callback:v=>v===1?'골든':v===-1?'데드':'',stepSize:1},afterFit:s=>{s.width=64;},grid:{color:'rgba(128,128,128,.1)'}}},
    plugins:{legend:{display:false},tooltip:{enabled:false}}},plugins:[]
});

PC.data.datasets=[
  {label:'MA10',data:[],borderColor:'#CC7700',borderWidth:1,pointRadius:0,tension:.1,spanGaps:true},

// ── 뷰 계산 ──────────────────────────────────────────────────
function vs(){return Math.max(0,candles.length-VIS);}
function mkLbl(){return Array.from({length:VIS+VP},(_,i)=>i);}
function vdata(fn){const s=vs(),a=[];for(let i=s;i<candles.length;i++)a.push(fn(i));while(a.length<VIS)a.unshift(null);for(let i=0;i<VP;i++)a.push(null);return a;}

function buildPA(){
  const list=[],s=vs();
  for(let i=s;i<candles.length;i++){
    const c=candles[i],li=i-s,up=c.close>=c.open;
    list.push({t:'box',x1:li-.3,x2:li+.3,y1:Math.min(c.open,c.close),y2:Math.max(c.open,c.close),bg:up?uC:dC});
    list.push({t:'wick',xi:li,hi:c.high,lo:c.low,cl:up?uC:dC});
    if(vSig(i))list.push({t:'dot',xi:li,yi:c.high*1.01});
  }
  trades.forEach(t=>{
    if(t.i<s||t.i>=candles.length)return;
    const c=candles[t.i],li=t.i-s,sz=t.half?0.65:1.0;
    if(t.buy)list.push({t:'arrow',xi:li,yi:c.low*.985,cl:bC,up:true,sz});
    else list.push({t:'arrow',xi:li,yi:c.high*1.015,cl:sC,up:false,sz});
  });
  return list;
}
function buildVA(){const hv=hvol(candles.length-1),vc=candles.length-vs();return[{t:'hline',x1:0,x2:vc-1+VP,yv:hv,cl:'#D4537E'}];}

// ── 차트 갱신 ────────────────────────────────────────────────
function refresh(){
  if(!candles.length)return;
  const s=vs(),lbls=mkLbl();
  PC.data.labels=lbls;
  PC.data.datasets[0].data=vdata(i=>ma(10,i));
  PC.data.datasets[1].data=vdata(i=>ma(40,i));
  PC.data.datasets[2].data=showBB?vdata(i=>bbUpper(i)):vdata(()=>null);
  PC.data.datasets[3].data=showBB?vdata(i=>bbLower(i)):vdata(()=>null);
  PC.options.plugins.ann.list=buildPA();
  let mn=Infinity,mx=-Infinity;
  for(let i=s;i<candles.length;i++){if(candles[i].low<mn)mn=candles[i].low;if(candles[i].high>mx)mx=candles[i].high;}
  const pd=(mx-mn)*.08;PC.options.scales.y.min=mn-pd;PC.options.scales.y.max=mx+pd;

  VC.data.labels=lbls;
  VC.data.datasets[0].data=vdata(i=>candles[i].volume);
  VC.data.datasets[0].backgroundColor=candles.slice(s).map(c=>c.close>=c.open?uV:dV);
  VC.options.plugins.ann.list=buildVA();

  DC.data.labels=lbls;DC.data.datasets[0].data=vdata(i=>ddS(i));

  MT.data.labels=lbls;
  const mtData=vdata(i=>ma40Dir(i));
  MT.data.datasets[0].data=mtData;
  MT.data.datasets[0].backgroundColor=mtData.map(v=>v===1?'rgba(226,75,74,0.7)':v===-1?'rgba(55,138,221,0.7)':'rgba(180,180,180,0.4)');
  const lastDir=ma40Dir(candles.length-1);
  const trendEl=document.getElementById('vMaTrend');
  if(lastDir===1){trendEl.textContent='▲ 상승';trendEl.style.color='#E24B4A';}
  else if(lastDir===-1){trendEl.textContent='▼ 하락';trendEl.style.color='#378ADD';}
  else{trendEl.textContent='— 횡보';trendEl.style.color='#888';}

  MC.data.labels=lbls;
  const mcData=vdata(i=>ma40Cross(i));
  MC.data.datasets[0].data=mcData;
  MC.data.datasets[0].backgroundColor=mcData.map(v=>v===1?'rgba(245,166,35,0.9)':v===-1?'rgba(46,205,167,0.9)':'rgba(0,0,0,0)');
  const lastCross=ma40Cross(candles.length-1);
  const crossEl=document.getElementById('vMaCross');
  if(lastCross===1){crossEl.textContent='▲ 골든크로스';crossEl.style.color='#F5A623';}
  else if(lastCross===-1){crossEl.textContent='▼ 데드크로스';crossEl.style.color='#2ECDA7';}
  else{crossEl.textContent='-';crossEl.style.color='#555';}

  PC.update('none');VC.update('none');DC.update('none');MT.update('none');MC.update('none');
  updateUI();
}

function log(t){const el=document.getElementById('tlog'),d=document.createElement('div');d.textContent=t;el.prepend(d);}

function doBuy(){
  if(pos){log('이미 보유 중입니다.');return;}
  if(halfSlots.length>0){log('분할 매수 중입니다.');return;}
  const last=candles[candles.length-1],idx=candles.length-1;
  pos={p:last.close,i:idx,d:elapsed,snap:snapshot(idx),maxPct:0,minPct:0};
  trades.push({i:idx,buy:true,half:false});
  log('매수 @ '+fp(last.close)+' ('+elapsed+'일째)');refresh();
}
function doHalfBuy(){
  if(pos){log('이미 전체 매수 중입니다.');return;}
  if(halfSlots.length>=2){log('분할 매수는 2회까지만 가능합니다.');return;}
  const last=candles[candles.length-1],idx=candles.length-1;
  const label=halfSlots.length===0?'1/2':'2/2';
  halfSlots.push({p:last.close,i:idx,d:elapsed,snap:snapshot(idx),maxPct:0,minPct:0});
  trades.push({i:idx,buy:true,half:true,label});
  log('½매수('+label+') @ '+fp(last.close)+' ('+elapsed+'일째)');refresh();
}
function doSell(){
  if(!pos&&halfSlots.length===0){log('보유 중인 포지션이 없습니다.');return;}
  const last=candles[candles.length-1],idx=candles.length-1;
  if(pos){
    const gross=(last.close-pos.p)/pos.p*100,net=gross-FEE*100;
    tPnl+=net;net>0?wins++:losses++;
    const h=elapsed-pos.d;holdSum+=h;
    trades.push({i:idx,buy:false,half:false});
    log('매도 @ '+fp(last.close)+' | 보유 '+h+'일 | '+net.toFixed(1)+'%');
    const record={no:tradeHistory.length+1,buyPrice:pos.p,sellPrice:last.close,buyDay:pos.d,sellDay:elapsed,holdDays:h,netPct:net,grossPct:gross,maxPct:pos.maxPct,minPct:pos.minPct,win:net>0,buySnap:pos.snap,sellSnap:snapshot(idx)};
    tradeHistory.push(record);pos=null;refresh();requestAIAnalysis(record);
  }else{
    const avgP=halfSlots.reduce((s,h)=>s+h.p,0)/halfSlots.length;
    const gross=(last.close-avgP)/avgP*100,net=gross-FEE*100*halfSlots.length;
    tPnl+=net;net>0?wins++:losses++;
    const h=elapsed-halfSlots[0].d;holdSum+=h;
    trades.push({i:idx,buy:false,half:true,label:'청산'});
    log('½청산 @ '+fp(last.close)+' | 평균매수 '+fp(Math.round(avgP))+' | 보유 '+h+'일 | '+net.toFixed(1)+'%');
    const record={no:tradeHistory.length+1,buyPrice:avgP,sellPrice:last.close,buyDay:halfSlots[0].d,sellDay:elapsed,holdDays:h,netPct:net,grossPct:gross,maxPct:Math.max(...halfSlots.map(s=>s.maxPct)),minPct:Math.min(...halfSlots.map(s=>s.minPct)),win:net>0,buySnap:halfSlots[0].snap,sellSnap:snapshot(idx)};
    tradeHistory.push(record);halfSlots=[];refresh();requestAIAnalysis(record);
  }
}
function doHalfSell(){
  if(!pos&&halfSlots.length===0){log('보유 중인 포지션이 없습니다.');return;}
  const last=candles[candles.length-1],idx=candles.length-1;
  if(pos){
    const gross=(last.close-pos.p)/pos.p*100,net=gross-FEE*100,halfNet=net*0.5;
    tPnl+=halfNet;
    trades.push({i:idx,buy:false,half:true,label:'½'});
    log('½매도 @ '+fp(last.close)+' | 절반 청산 '+halfNet.toFixed(1)+'%');
    halfSlots=[{...pos,ratio:0.5}];pos=null;refresh();
  }else{
    if(halfSlots.length===0){log('보유 포지션 없음');return;}
    const s=halfSlots.shift();
    const gross=(last.close-s.p)/s.p*100,net=gross-FEE*100,halfNet=net*0.5;
    tPnl+=halfNet;
    trades.push({i:idx,buy:false,half:true,label:'½'});
    log('½매도 @ '+fp(last.close)+' | '+net.toFixed(1)+'% (절반)');refresh();
  }
}

// ── tick ─────────────────────────────────────────────────────
function tick(){
  if(MODE==='real'&&window._realAllCandles&&window._realNextIdx<window._realAllCandles.length){
    candles.push(window._realAllCandles[window._realNextIdx]);
    window._realNextIdx++;
  }else{
    candles.push(genC(candles[candles.length-1]));
  }
  elapsed++;
  if(pos){const cur=(candles[candles.length-1].close-pos.p)/pos.p*100;if(cur>pos.maxPct)pos.maxPct=cur;if(cur<pos.minPct)pos.minPct=cur;}
  halfSlots.forEach(s=>{const cur=(candles[candles.length-1].close-s.p)/s.p*100;if(cur>s.maxPct)s.maxPct=cur;if(cur<s.minPct)s.minPct=cur;});
  if(candles.length>600){candles.shift();trades.forEach(t=>{t.i--;});if(pos)pos.i--;trades=trades.filter(t=>t.i>=0);}
  refresh();
}
function startT(){if(timer)clearInterval(timer);timer=setInterval(tick,intSec*1000);}
function stopT(){if(timer){clearInterval(timer);timer=null;}}

async function loadReal(code){
  showOv(code+' 불러오는 중...');
  stopT();
  try{
    const res=await fetch(WORKER+'/ohlcv?code='+code);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const js=await res.json();
    if(js.error)throw new Error(js.error);
    if(!js.candles||js.candles.length<10)throw new Error('데이터 부족');
    const allCandles=js.candles.map(d=>({open:+d.open,high:+d.high,low:+d.low,close:+d.close,volume:+d.volume})).filter(d=>d.open>0&&d.close>0);
    const total=allCandles.length;
    const minStart=Math.max(80,Math.floor(total*0.1));
    const maxStart=Math.floor(total*0.8);
    const startIdx=Math.floor(Math.random()*(maxStart-minStart+1))+minStart;
    const stockName=js.name||stockList.find(s=>s.code===code)?.name||code;
    // 초기화 후 데이터 세팅
    resetStats();
    candles=allCandles.slice(0,startIdx);
    window._realAllCandles=allCandles;
    window._realNextIdx=startIdx;
    curStock={name:stockName,code:code,count:js.count,from:js.from,to:js.to,totalCandles:total};
    elapsed=0;reg='SIDEWAYS';rrem=25;sig2=1e-4;pe=0;
    const startDate=allCandles[startIdx-1]?.date||'';
    const pct=((startIdx/total)*100).toFixed(0);
    setBanner('📈 '+stockName+' ('+code+') | 전체 '+total+'일 중 '+pct+'% 지점('+startDate+')에서 시작','breal');
    hideOv();
    refresh();
  }catch(e){
    hideOv();alert('불러오기 실패: '+e.message);
  }
}

async function requestPatternAnalysis(){
  if(tradeHistory.length<3)return;
  document.getElementById('aiPatternBox').style.display='block';
  document.getElementById('aiPatternText').textContent='⏳ 패턴 분석 중...';
  const tot=wins+losses,wr=(wins/tot*100).toFixed(1),avgH=(holdSum/tot).toFixed(1);
  const wt=tradeHistory.filter(t=>t.win),lt=tradeHistory.filter(t=>!t.win);
  const avgWin=wt.reduce((s,t)=>s+t.netPct,0)/(wins||1),avgLoss=lt.reduce((s,t)=>s+t.netPct,0)/(losses||1);
  const pf=losses>0?Math.abs(avgWin/avgLoss):99;
  const buyUp=tradeHistory.filter(t=>t.buySnap?.ma5>t.buySnap?.ma20&&t.buySnap?.ma20>t.buySnap?.ma80).length;
  const avgMaxPct=tradeHistory.reduce((s,t)=>s+t.maxPct,0)/tot;
  const prompt=`주식 매매 트레이닝 코치. 마크다운 없이 한국어로.
===== ${tot}회 매매 성과 =====
승률:${wr}%(${wins}승${losses}패) | 평균수익:+${avgWin.toFixed(1)}% | 평균손실:${avgLoss.toFixed(1)}%
손익비:${pf.toFixed(2)} | 평균보유:${avgH}일 | 누적:${tPnl.toFixed(1)}%
정배열매수:${buyUp}/${tot}회 | 평균최고수익:+${avgMaxPct.toFixed(1)}%
최근5거래:${tradeHistory.slice(-5).map(t=>'#'+t.no+' '+(t.win?'수익':'손실')+t.netPct.toFixed(1)+'%').join(',')}
1.매수습관분석 2.매도습관분석 3.손익비분석 4.반복실수패턴 5.개선책2~3가지`;
  try{
    const text=await callAI(prompt);document.getElementById('aiPatternText').textContent=text;
  }catch(e){document.getElementById('aiPatternText').textContent='패턴 분석 오류: '+e.message;}
}

// ── 유틸 ─────────────────────────────────────────────────────
function setBanner(t,c){const el=document.getElementById('banner');el.textContent=t;el.className='banner '+c;}
function showOv(m){document.getElementById('ovmsg').textContent=m;document.getElementById('overlay').className='show';}
function hideOv(){document.getElementById('overlay').className='';}
function getNextRandStock(){
  if(!stockList.length)return null;
  if(stockShuffleIdx>=stockShuffled.length){stockShuffled=[...stockList].sort(()=>Math.random()-.5);stockShuffleIdx=0;}
  return stockShuffled[stockShuffleIdx++];
}

// ── 이벤트 ───────────────────────────────────────────────────
document.getElementById('btnLoad').onclick=()=>{const v=document.getElementById('stockSel').value;if(v)loadReal(v);};

// 볼린저밴드 체크박스 초기값 반영
const chkBB=document.getElementById('chkBB');
chkBB.checked=showBB;
chkBB.onchange=()=>{
  showBB=chkBB.checked;
  localStorage.setItem('showBB', showBB);
  refresh();
};
document.getElementById('btnRandStock').onclick=()=>{
  if(!stockList.length)return;
  const s=getNextRandStock();
  document.getElementById('stockSel').value=s.code;loadReal(s.code);
};
document.getElementById('btnStart').onclick=startT;
document.getElementById('btnPause').onclick=stopT;
document.getElementById('btnReset').onclick=()=>{stopT();resetStats();if(curStock)loadReal(curStock.code);};
document.getElementById('btnBuy').onclick=doBuy;
document.getElementById('btnHalfBuy').onclick=doHalfBuy;
document.getElementById('btnHalfSell').onclick=doHalfSell;
document.getElementById('btnSell').onclick=doSell;

[['s05',.5],['s1',1],['s2',2],['s3',3]].forEach(([id,v])=>{
  document.getElementById(id).onclick=()=>{
    intSec=v;['s05','s1','s2','s3'].forEach(k=>document.getElementById(k).className=k===id?'b':'');
    if(timer)startT();
  };
});
[['c1',10000000],['c5',50000000],['c10',100000000]].forEach(([id,v])=>{
  document.getElementById(id).onclick=()=>{
    capital=v;['c1','c5','c10'].forEach(k=>document.getElementById(k).className=k===id?'b':'');updateUI();
  };
});

// ── 시작 ─────────────────────────────────────────────────────
loadStockList();

})();
